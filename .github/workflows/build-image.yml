name: Family Image Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'family-boot/**'

concurrency:
  group: family-production
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: mingus
  BACKEND_IMAGE_NAME: family

jobs:
  docker-build:
    name: Build And Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          backend_repository="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}"
          short_sha="${GITHUB_SHA::7}"
          {
            echo 'backend_tags<<EOF'
            echo "${backend_repository}:${GITHUB_SHA}"
            echo "${backend_repository}:${short_sha}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${backend_repository}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./family-boot
          file: ./family-boot/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.backend_tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To Production
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 10 -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        shell: bash
        run: |
          ssh "$SERVER_USERNAME@$SERVER_HOST" \
            "mkdir -p /data/mingus/family/docker"
          scp family-boot/docker/docker-compose.yml \
            "$SERVER_USERNAME@$SERVER_HOST:/data/mingus/family/docker/docker-compose.yml.uploading"
          scp family-boot/docker/deploy.sh \
            "$SERVER_USERNAME@$SERVER_HOST:/data/mingus/family/docker/deploy.sh.uploading"

      - name: Pull image and deploy
        shell: bash
        run: |
          printf '%s' "$DOCKER_PASSWORD" | ssh "$SERVER_USERNAME@$SERVER_HOST" \
            "docker login registry.cn-hangzhou.aliyuncs.com --username '$DOCKER_USERNAME' --password-stdin"
          ssh "$SERVER_USERNAME@$SERVER_HOST" \
            "set -eu; \
             cd /data/mingus/family/docker; \
             mv docker-compose.yml.uploading docker-compose.yml; \
             mv deploy.sh.uploading deploy.sh; \
             chmod 755 deploy.sh; \
             ./deploy.sh '${GITHUB_SHA}'"

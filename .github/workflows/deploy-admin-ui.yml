name: Family Admin UI Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'family-admin-ui/**'

concurrency:
  group: family-admin-ui-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build And Deploy Admin UI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: family-admin-ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: family-admin-ui
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: family-admin-ui
        run: pnpm build

      - name: Package build output
        shell: bash
        run: |
          test -s family-admin-ui/dist/index.html
          tar -C family-admin-ui/dist -czf "family-admin-ui-${GITHUB_SHA}.tar.gz" .

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 10 -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload build output
        shell: bash
        run: |
          ssh "$SERVER_USERNAME@$SERVER_HOST" \
            "mkdir -p /data/mingus/nginx/html/family"
          scp "family-admin-ui-${GITHUB_SHA}.tar.gz" \
            "$SERVER_USERNAME@$SERVER_HOST:/data/mingus/nginx/html/family/.admin-ui-${GITHUB_SHA}.tar.gz"

      - name: Activate release
        shell: bash
        run: |
          ssh "$SERVER_USERNAME@$SERVER_HOST" \
            "GITHUB_SHA='$GITHUB_SHA' sh -s" <<'REMOTE'
          set -eu

          base_dir=/data/mingus/nginx/html/family
          archive="$base_dir/.admin-ui-$GITHUB_SHA.tar.gz"
          release="$base_dir/.dist-$GITHUB_SHA"
          target="$base_dir/dist"
          previous="$base_dir/.dist-previous"

          docker exec mingus-nginx nginx -t

          rm -rf "$release"
          mkdir -p "$release"
          tar -xzf "$archive" -C "$release"
          test -s "$release/index.html"
          chmod -R a+rX "$release"

          rm -rf "$previous"
          if [ -d "$target" ]; then
            mv "$target" "$previous"
          fi

          if mv "$release" "$target"; then
            rm -f "$archive"
          else
            if [ -d "$previous" ]; then
              mv "$previous" "$target"
            fi
            exit 1
          fi

          docker exec mingus-nginx nginx -s reload
          test -s "$target/index.html"
          echo "Admin UI deployed: $GITHUB_SHA"
          REMOTE
